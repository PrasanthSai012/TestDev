name: Deploy ci-cd-project to CloudHub 2.0

on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - debug
      tags:
        description: 'Test scenario tags'
        required: false
        type: boolean
      environment:
        description: 'Environment to run tests against'
        type: environment
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Publish to Anypoint Exchange
        run: |
          mvn deploy -s settings.xml \
            -DconnectedAppClientId=988e49247ac4469ba7ba48f8f4d81418 \
            -DconnectedAppClientSecret=4C0b4feF6E10404CA4d9583374CF90E8 \
            -DbusinessGroupId=e721e92f-d213-4840-bb8f-6d4d4ebc02b5

      - name: Deploy to CloudHub 2.0
        run: |
          mvn deploy -DmuleDeploy -s settings.xml \
            -DconnectedAppClientId=988e49247ac4469ba7ba48f8f4d81418 \
            -DconnectedAppClientSecret=4C0b4feF6E10404CA4d9583374CF90E8 \
            -DappName=ci-cd-project \
            -Denv=Sandbox \
            -DbusinessGroupId=e721e92f-d213-4840-bb8f-6d4d4ebc02b5 \
            -Dtarget=Cloudhub-US-East-1
